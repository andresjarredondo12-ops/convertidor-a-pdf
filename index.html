<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sincronizador Andreani Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #111; color: #eee; padding: 40px; text-align: center; }
        .card { max-width: 700px; margin: auto; background: #222; padding: 30px; border-radius: 15px; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00d1b2; margin-top: 0; }
        .step { margin: 20px 0; padding: 15px; background: #2c2c2c; border-radius: 8px; }
        button { background: #00d1b2; color: #111; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #log { margin-top: 20px; text-align: left; background: #000; padding: 15px; height: 300px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 12px; color: #00ff00; border: 1px solid #333; }
        .info { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Convertidor Binario de Constancias</h2>
    <p>Extrae el PDF original desde los archivos HTML descargados.</p>

    <div class="step">
        <button onclick="selectDest()">1. Carpeta de Destino (PDFs)</button>
    </div>
    
    <div class="step">
        <button id="btnProcess" onclick="document.getElementById('fileInput').click()" disabled>2. Seleccionar Carpeta con HTMLs</button>
        <input type="file" id="fileInput" webkitdirectory multiple style="display:none">
    </div>

    <div id="log">Esperando acción...</div>
    <div class="info">Nota: Los archivos se renombrarán automáticamente usando el Nro de Envío e ID.</div>
</div>

<iframe id="engine" style="display:none"></iframe>

<script>
    let destHandle = null;

    function log(msg, color = "#00ff00") {
        const l = document.getElementById("log");
        l.innerHTML += `<span style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
        l.scrollTop = l.scrollHeight;
    }

    async function selectDest() {
        try {
            destHandle = await window.showDirectoryPicker();
            log("✅ Carpeta de destino lista.");
            document.getElementById("btnProcess").disabled = false;
        } catch (e) { log("❌ Selección cancelada.", "#ff4757"); }
    }

    document.getElementById('fileInput').onchange = async (e) => {
        const files = Array.from(e.target.files).filter(f => f.name.endsWith(".html"));
        const engine = document.getElementById("engine");

        log(`📂 Iniciando conversión de ${files.length} archivos...`, "#f1c40f");

        for (const file of files) {
            try {
                const content = await file.text();
                
                // Inyectamos el HTML en el iframe
                engine.srcdoc = content;

                // Esperamos un momento para que el navegador resuelva el blob interno
                await new Promise(r => setTimeout(r, 1200));

                const doc = engine.contentDocument || engine.contentWindow.document;
                const text = doc.body.innerText;

                // --- Extracción de Datos para Nombre ---
                const nroEnvio = text.match(/\b\d{15}\b/)?.[0] || "ERROR_NRO";
                const idMatch = text.match(/ID\s*[:\-]?\s*(\d+)/i);
                const idC = idMatch ? idMatch[1] : "ID_DESCONOCIDO";
                
                const finalName = `${nroEnvio}_ID_${idC}.pdf`;

                // --- Captura del PDF Real ---
                // Buscamos el objeto que contiene el PDF (Andreani usa embed o iframe)
                const pdfElement = doc.querySelector('embed[type="application/pdf"], iframe[src^="blob:"], object');
                
                if (pdfElement && (pdfElement.src || pdfElement.data)) {
                    const blobUrl = pdfElement.src || pdfElement.data;
                    
                    // FETCH directo al blob para obtener el archivo original sin corrupción
                    const res = await fetch(blobUrl);
                    const pdfBlob = await res.blob();

                    // Guardado en la carpeta elegida
                    const fileH = await destHandle.getFileHandle(finalName, { create: true });
                    const writable = await fileH.createWritable();
                    await writable.write(pdfBlob);
                    await writable.close();

                    log(`✔ PROCESADO: ${finalName}`);
                } else {
                    log(`⚠️ No se pudo extraer binario de ${file.name} (HTML vacío o expirado)`, "#ff4757");
                }

            } catch (err) {
                log(`❌ ERROR en ${file.name}: ${err.message}`, "#ff4757");
            }
        }
        log("🎉 FINALIZADO. Revisa tu carpeta de destino.", "#f1c40f");
    };
</script>

</body>
</html>
