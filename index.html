<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Convertidor Andreani - Solución ZIP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 40px; text-align: center; }
        .card { max-width: 600px; margin: auto; background: #252525; padding: 30px; border-radius: 12px; border: 1px solid #333; }
        button { background: #00b894; color: white; border: none; padding: 15px 30px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #00947a; }
        #log { margin-top: 20px; text-align: left; background: #000; padding: 15px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; color: #00ff00; border: 1px solid #444; }
        .progress-bar { height: 10px; background: #444; border-radius: 5px; margin-top: 15px; overflow: hidden; }
        #progress { height: 100%; background: #00b894; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="card">
    <h2>📦 Convertidor Andreani (Modo ZIP)</h2>
    <p>Selecciona la carpeta con los HTMLs para generar un único ZIP con todos los PDFs corregidos.</p>
    
    <button onclick="document.getElementById('fileInput').click()">Seleccionar Carpeta con HTMLs</button>
    <input type="file" id="fileInput" webkitdirectory multiple style="display:none">
    
    <div class="progress-bar"><div id="progress"></div></div>
    <div id="log">Esperando archivos...</div>
</div>

<iframe id="engine" style="display:none"></iframe>

<script>
    const log = (msg, isErr = false) => {
        const l = document.getElementById("log");
        l.innerHTML += `<span style="color:${isErr ? '#ff4757' : '#00ff00'}">${msg}</span><br>`;
        l.scrollTop = l.scrollHeight;
    };

    document.getElementById('fileInput').onchange = async (e) => {
        const files = Array.from(e.target.files).filter(f => f.name.endsWith(".html"));
        if (files.length === 0) return log("No hay archivos HTML.", true);

        const zip = new JSZip();
        const engine = document.getElementById("engine");
        const progressBar = document.getElementById("progress");
        
        log(`🚀 Iniciando proceso de ${files.length} archivos...`);

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            try {
                const content = await file.text();
                engine.srcdoc = content;

                // Esperamos que el PDF cargue en el iframe
                await new Promise(r => setTimeout(r, 1000));

                const doc = engine.contentDocument || engine.contentWindow.document;
                const text = doc.body.innerText;

                // Regex para nombre
                const nroEnvio = text.match(/\b\d{15}\b/)?.[0] || `S_NRO_${i}`;
                const idMatch = text.match(/ID\s*[:\-]?\s*(\d+)/i);
                const idC = idMatch ? idMatch[1] : "000";
                const finalName = `${nroEnvio}_ID_${idC}.pdf`;

                // Captura del PDF real (Blob)
                const pdfElement = doc.querySelector('embed, iframe[src^="blob:"], object');
                
                if (pdfElement) {
                    const blobUrl = pdfElement.src || pdfElement.data;
                    const res = await fetch(blobUrl);
                    const pdfBlob = await res.blob();

                    // Agregamos al ZIP en lugar de guardar en disco
                    zip.file(finalName, pdfBlob);
                    log(`✔ Agregado: ${finalName}`);
                } else {
                    log(`⚠️ Saltado: ${file.name} (No se encontró binario)`, true);
                }

            } catch (err) {
                log(`❌ Error en ${file.name}: ${err.message}`, true);
            }

            // Actualizar barra de progreso
            progressBar.style.width = `${((i + 1) / files.length) * 100}%`;
        }

        log("<br>📦 Generando archivo ZIP final... (esto puede tardar)");
        
        // Generamos el ZIP y lo descargamos (una sola activación de usuario)
        const zipBlob = await zip.generateAsync({type: "blob"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(zipBlob);
        link.download = "Constancias_Andreani_PDF.zip";
        link.click();

        log("🎉 ¡TERMINADO! Se descargó el archivo ZIP con todos tus PDFs.");
    };
</script>

</body>
</html>
