<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HTML → PDF AUTO SYSTEM (FIX)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{background:#080c14;color:#e2e8f0;font-family:Arial;padding:30px}
.card{background:#0d1526;border:1px solid #1a2744;padding:25px;border-radius:12px}
button{padding:12px;margin:5px;background:#2563eb;color:#fff;border:none;cursor:pointer}
#log{height:220px;overflow:auto;background:#020408;padding:10px;font-size:12px}
.track{height:6px;background:#222;margin-top:10px}
#bar{height:6px;background:#38bdf8;width:0%}
.stat{margin-top:10px}
iframe{width:800px;height:1000px;border:1px solid #333;display:none}
</style>
</head>

<body>

<h2>🚀 HTML → PDF AUTO SYSTEM (FIX)</h2>

<div class="card">

<button id="btnDestino">1. Elegir carpeta destino</button>
<button id="btnProcesar" disabled>2. Seleccionar carpeta HTML</button>

<input type="file" id="inputHTML" webkitdirectory multiple hidden>

<div class="track"><div id="bar"></div></div>

<div class="stat">
Total: <span id="total">0</span> |
OK: <span id="ok">0</span> |
Error: <span id="err">0</span>
</div>

<div id="log"></div>

</div>

<iframe id="frame"></iframe>

<script>

const fsa = ('showDirectoryPicker' in window);
let dirHandle = null;

const logDiv = document.getElementById('log');
const bar = document.getElementById('bar');

function log(msg,color="#64748b"){
    logDiv.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    logDiv.scrollTop = logDiv.scrollHeight;
}

// ===== EXTRACCIÓN =====
function extraerSeguimiento(texto){
    let m = texto.match(/\b\d{15}\b/);
    return m ? m[0] : "SIN_SEGUIMIENTO";
}

function extraerID(texto){
    let m = texto.match(/ID[:\s#-]*([A-Z0-9\-]+)/i);
    return m ? m[1] : "0000";
}

// ===== BOTONES =====
document.getElementById('btnDestino').onclick = async()=>{
    if(!fsa){ alert("Usar Chrome/Edge"); return; }
    try{
        dirHandle = await showDirectoryPicker();
        log("📁 Carpeta destino: "+dirHandle.name,"#22c55e");
        document.getElementById('btnProcesar').disabled = false;
    }catch(e){
        log("Cancelado","#eab308");
    }
};

document.getElementById('btnProcesar').onclick = ()=>{
    document.getElementById('inputHTML').click();
};

// ===== PROCESAMIENTO =====
document.getElementById('inputHTML').onchange = async(e)=>{

    const files = Array.from(e.target.files)
        .filter(f => f.name.toLowerCase().endsWith(".html"));

    if(files.length === 0){
        log("No se encontraron HTML","#eab308");
        return;
    }

    let ok=0, err=0;

    document.getElementById('total').textContent = files.length;

    const frame = document.getElementById('frame');

    for(let i=0;i<files.length;i++){

        const file = files[i];

        try{

            log(`📄 (${i+1}/${files.length}) ${file.name}`);

            // 🔥 CLAVE: usar URL en lugar de srcdoc
            const url = URL.createObjectURL(file);
            frame.src = url;

            // 🔥 esperar render REAL
            await new Promise(resolve=>{
                frame.onload = ()=>resolve();
            });

            const doc = frame.contentDocument;

            if(!doc || !doc.body){
                throw new Error("No se pudo renderizar HTML");
            }

            const texto = doc.body.innerText;

            const seguimiento = extraerSeguimiento(texto);
            const id = extraerID(texto);

            const nombre = `${seguimiento}(id_${id}).pdf`;

            // 🔥 conversión robusta
            const blob = await html2pdf()
                .set({
                    margin:0,
                    html2canvas:{
                        scale:2,
                        useCORS:true,
                        allowTaint:true
                    },
                    jsPDF:{
                        unit:'mm',
                        format:'a4',
                        orientation:'portrait'
                    }
                })
                .from(doc.body)
                .outputPdf('blob');

            // 🔥 guardado directo
            if(fsa && dirHandle){
                const handle = await dirHandle.getFileHandle(nombre,{create:true});
                const writable = await handle.createWritable();
                await writable.write(blob);
                await writable.close();
            }else{
                const a=document.createElement("a");
                a.href=URL.createObjectURL(blob);
                a.download=nombre;
                a.click();
            }

            ok++;
            document.getElementById('ok').textContent = ok;

            log("✔ "+nombre,"#22c55e");

            URL.revokeObjectURL(url);

        }catch(e){
            err++;
            document.getElementById('err').textContent = err;
            log("ERROR: "+file.name+" -> "+e.message,"#ef4444");
        }

        bar.style.width = ((i+1)/files.length*100)+"%";

        // evita congelamiento
        await new Promise(r=>setTimeout(r,100));
    }

    log("🎉 FINALIZADO","cyan");
};

</script>

</body>
</html>
