<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Convertidor HTML → PDF PRO (Batch + ZIP)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #121212;
    color: white;
    text-align: center;
    padding: 20px;
}
button {
    padding: 12px 25px;
    margin: 10px;
    background: #0984e3;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
#log {
    margin-top: 15px;
    text-align: left;
    background: #1e1e1e;
    padding: 10px;
    height: 250px;
    overflow-y: auto;
}
#progressBar {
    width: 100%;
    background: #333;
    height: 20px;
    margin-top: 10px;
}
#progress {
    height: 100%;
    width: 0%;
    background: #00b894;
}
iframe {
    width: 800px;
    height: 1000px;
    display: none;
}
</style>
</head>

<body>

<h2>🚀 Convertidor Masivo HTML → PDF (ZIP)</h2>

<input type="file" id="fileInput" multiple accept=".html">
<br>
<button onclick="procesar()">Procesar y Descargar ZIP</button>

<div id="progressBar"><div id="progress"></div></div>

<div id="log"></div>

<iframe id="preview"></iframe>

<script>

const zip = new JSZip();

function log(msg) {
    let logDiv = document.getElementById("log");
    logDiv.innerHTML += msg + "<br>";
    logDiv.scrollTop = logDiv.scrollHeight;
}

function actualizarProgreso(actual, total) {
    let porcentaje = (actual / total) * 100;
    document.getElementById("progress").style.width = porcentaje + "%";
}

// Buscar tracking (15 dígitos)
function extraerSeguimiento(texto) {
    let match = texto.match(/\b\d{15}\b/);
    return match ? match[0] : "SIN_SEGUIMIENTO";
}

// Buscar ID
function extraerID(texto) {
    let match = texto.match(/ID[:\s]*([A-Z0-9\-]+)/i);
    return match ? match[1] : "SIN_ID";
}

// Espera controlada (evita saturación)
function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

async function procesar() {

    const files = document.getElementById("fileInput").files;

    if (files.length === 0) {
        alert("Seleccioná archivos HTML");
        return;
    }

    log("📦 Archivos cargados: " + files.length);

    const iframe = document.getElementById("preview");

    for (let i = 0; i < files.length; i++) {

        let file = files[i];

        log(`📄 Procesando (${i+1}/${files.length}): ${file.name}`);

        let contenido = await file.text();

        iframe.srcdoc = contenido;

        await sleep(500); // render estable

        let doc = iframe.contentDocument;

        let texto = doc.body.innerText;

        let seguimiento = extraerSeguimiento(texto);
        let id = extraerID(texto);

        let nombre = `${seguimiento}_${id}.pdf`;

        let opt = {
            margin: 0,
            filename: nombre,
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4' }
        };

        // Generar PDF en blob (NO descargar aún)
        let pdfBlob = await html2pdf()
            .set(opt)
            .from(doc.body)
            .outputPdf('blob');

        zip.file(nombre, pdfBlob);

        log("✔ Agregado al ZIP: " + nombre);

        actualizarProgreso(i + 1, files.length);

        await sleep(200); // evita freeze
    }

    log("📦 Generando ZIP...");

    let contenidoZip = await zip.generateAsync({ type: "blob" });

    let link = document.createElement("a");
    link.href = URL.createObjectURL(contenidoZip);
    link.download = "PDFs_convertidos.zip";
    link.click();

    log("🎉 DESCARGA COMPLETA");
}

</script>

</body>
</html>
