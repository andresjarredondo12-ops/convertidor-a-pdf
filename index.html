<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HTML → PDF Auto System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root{
--bg:#080c14;--surface:#0d1526;--border:#1a2744;
--accent:#2563eb;--accent2:#38bdf8;
--green:#22c55e;--red:#ef4444;--text:#e2e8f0;
}
body{background:var(--bg);color:var(--text);font-family:Arial;padding:30px}
.card{background:var(--surface);border:1px solid var(--border);padding:25px;border-radius:12px}
button{padding:12px;background:var(--accent);border:none;color:white;cursor:pointer;margin:5px}
#log{height:200px;overflow:auto;background:#020408;padding:10px;margin-top:15px;font-size:12px}
#progress{height:6px;background:var(--accent2);width:0%}
.track{background:#222;height:6px;margin-top:10px}
iframe{display:none}
.stat{margin-top:10px}
</style>
</head>

<body>

<h2>🚀 HTML → PDF AUTO SYSTEM</h2>

<div class="card">

<button id="btnDestino">1. Elegir carpeta destino</button>
<button id="btnProcesar" disabled>2. Seleccionar carpeta HTML</button>

<input type="file" id="inputHTML" webkitdirectory multiple hidden>

<div class="track"><div id="progress"></div></div>

<div class="stat">
Total: <span id="total">0</span> |
OK: <span id="ok">0</span> |
Error: <span id="err">0</span>
</div>

<div id="log"></div>

</div>

<iframe id="frame"></iframe>

<script>

let dirHandle = null;
const fsa = 'showDirectoryPicker' in window;

const logDiv = document.getElementById('log');
const progress = document.getElementById('progress');

function log(msg,color="#888"){
    logDiv.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    logDiv.scrollTop = logDiv.scrollHeight;
}

// EXTRAER TRACKING
function getTracking(text){
    let m = text.match(/\b\d{15}\b/);
    return m ? m[0] : "SIN_TRACK";
}

// EXTRAER ID
function getID(text){
    let m = text.match(/ID[:\s]*([A-Z0-9\-]+)/i);
    return m ? m[1] : "0000";
}

document.getElementById('btnDestino').onclick = async()=>{
    if(!fsa){ alert("Usar Chrome/Edge"); return;}
    dirHandle = await showDirectoryPicker();
    log("Carpeta seleccionada: "+dirHandle.name,"#22c55e");
    document.getElementById('btnProcesar').disabled = false;
}

document.getElementById('btnProcesar').onclick=()=>{
    document.getElementById('inputHTML').click();
}

document.getElementById('inputHTML').onchange = async(e)=>{

    const files = Array.from(e.target.files).filter(f=>f.name.endsWith(".html"));

    document.getElementById('total').textContent = files.length;

    let ok=0, err=0;

    const frame = document.getElementById('frame');

    for(let i=0;i<files.length;i++){

        let file = files[i];

        try{

            log("Procesando: "+file.name);

            let html = await file.text();

            frame.srcdoc = html;

            await new Promise(r=>setTimeout(r,400));

            let doc = frame.contentDocument;

            let text = doc.body.innerText;

            let track = getTracking(text);
            let id = getID(text);

            let name = `${track}(id_${id}).pdf`;

            let blob = await html2pdf()
                .from(doc.body)
                .outputPdf('blob');

            if(fsa && dirHandle){
                const fileHandle = await dirHandle.getFileHandle(name,{create:true});
                const writable = await fileHandle.createWritable();
                await writable.write(blob);
                await writable.close();
            }else{
                let a=document.createElement("a");
                a.href=URL.createObjectURL(blob);
                a.download=name;
                a.click();
            }

            ok++;
            document.getElementById('ok').textContent = ok;
            log("✔ "+name,"#22c55e");

        }catch(e){
            err++;
            document.getElementById('err').textContent = err;
            log("ERROR: "+file.name+" -> "+e.message,"#ef4444");
        }

        progress.style.width = ((i+1)/files.length*100)+"%";

        await new Promise(r=>setTimeout(r,150));
    }

    log("FINALIZADO","cyan");
}

</script>

</body>
</html>
