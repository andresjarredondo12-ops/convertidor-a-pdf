<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Convertidor Masivo a PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        button:hover { background: #0056b3; }
        #status { margin-top: 15px; color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Convertidor HTML a PDF Masivo</h2>
    <p>Selecciona los archivos .html de tu carpeta:</p>
    
    <input type="file" id="fileInput" multiple accept=".html">
    <br><br>
    <button onclick="procesarArchivos()">Convertir y Descargar Todo</button>
    
    <div id="status"></div>
</div>

<div id="temp-content" style="display:none;"></div>

<script>
async function procesarArchivos() {
    const input = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const tempContainer = document.getElementById('temp-content');

    if (input.files.length === 0) {
        alert("Por favor, selecciona al menos un archivo.");
        return;
    }

    status.innerText = "Procesando archivos...";

    for (let file of input.files) {
        const text = await file.text(); // Leemos el contenido del HTML
        tempContainer.innerHTML = text; // Lo metemos en nuestro contenedor invisible

        const opciones = {
            margin:       10,
            filename:     file.name.replace('.html', '.pdf'),
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // Ejecutamos la conversión y descarga
        await html2pdf().set(opciones).from(tempContainer).save();
        
        status.innerText = `Descargado: ${file.name}`;
    }

    status.innerText = "¡Todos los archivos han sido procesados!";
    tempContainer.innerHTML = ""; // Limpiamos
}
</script>

</body>
</html>
