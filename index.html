<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Convertidor Andreani - FINAL ABSOLUTO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body { font-family: sans-serif; background:#1a1a1a; color:#eee; padding:40px; text-align:center;}
.card { max-width:600px; margin:auto; background:#252525; padding:30px; border-radius:12px; border:1px solid #333;}
button { background:#00b894; color:white; border:none; padding:15px 30px; border-radius:6px; cursor:pointer; font-size:16px; font-weight:bold;}
button:hover { background:#00947a;}
#log { margin-top:20px; text-align:left; background:#000; padding:15px; height:300px; overflow-y:auto; font-family:monospace; font-size:12px; color:#00ff00; border:1px solid #444;}
.progress-bar { height:10px; background:#444; border-radius:5px; margin-top:15px; overflow:hidden;}
#progress { height:100%; background:#00b894; width:0%; transition:width 0.3s;}
</style>
</head>

<body>

<div class="card">
<h2>📦 Convertidor Andreani (Nivel FINAL)</h2>
<button onclick="fileInput.click()">Seleccionar carpeta</button>
<input type="file" id="fileInput" webkitdirectory multiple hidden>

<div class="progress-bar"><div id="progress"></div></div>
<div id="log">Esperando archivos...</div>
</div>

<script>

const log = (msg, err=false)=>{
    const l=document.getElementById("log");
    l.innerHTML += `<span style="color:${err?'#ff4757':'#00ff00'}">${msg}</span><br>`;
    l.scrollTop=l.scrollHeight;
};

// 🔹 buscar base64
function findBase64(content){
    const matches = content.match(/[A-Za-z0-9+/=\s]{500,}/g);
    if(!matches) return null;

    for(let m of matches){
        let clean = m.replace(/\s+/g,'');
        if(clean.startsWith("JVBER")) return clean;
    }
    return null;
}

// 🔹 buscar URL de PDF
function findPdfUrl(content){
    // patrones comunes
    const patterns = [
        /https?:\/\/[^"' ]+\.pdf/gi,
        /\/[^"' ]+\.pdf/gi,
        /src\s*=\s*["']([^"']+)["']/gi
    ];

    for(let p of patterns){
        let match;
        while((match = p.exec(content)) !== null){
            let url = match[1] || match[0];

            if(url.includes("pdf") || url.includes("download") || url.includes("report")){
                return url;
            }
        }
    }
    return null;
}

fileInput.onchange = async (e)=>{
    const files = Array.from(e.target.files).filter(f=>f.name.endsWith(".html"));
    if(!files.length) return log("No hay HTML", true);

    const zip = new JSZip();
    const progress = document.getElementById("progress");

    log(`🚀 Procesando ${files.length} archivos...`);

    for(let i=0;i<files.length;i++){
        const file = files[i];

        try{
            const content = await file.text();

            const nro = content.match(/\b\d{15}\b/)?.[0] || `S_NRO_${i}`;
            const id = content.match(/ID\s*[:\-]?\s*(\d+)/i)?.[1] || "000";
            const name = `${nro}_ID_${id}.pdf`;

            // 🔥 1. intentar base64
            let base64 = findBase64(content);

            if(base64){
                const bin = atob(base64);
                const bytes = new Uint8Array(bin.length);

                for(let j=0;j<bin.length;j++){
                    bytes[j] = bin.charCodeAt(j);
                }

                zip.file(name, new Blob([bytes],{type:"application/pdf"}));
                log(`✔ base64: ${name}`);
            }

            else{
                // 🔥 2. buscar URL
                let url = findPdfUrl(content);

                if(url){
                    try{
                        const res = await fetch(url);
                        const blob = await res.blob();

                        zip.file(name, blob);
                        log(`✔ url: ${name}`);
                    }catch(e){
                        log(`❌ Error descargando PDF (${file.name})`, true);
                    }
                }else{
                    log(`❌ No se encontró PDF en ${file.name}`, true);
                }
            }

        }catch(err){
            log(`❌ Error en ${file.name}: ${err.message}`, true);
        }

        progress.style.width = `${((i+1)/files.length)*100}%`;
    }

    log("📦 Generando ZIP...");

    const zipBlob = await zip.generateAsync({type:"blob"});
    const a=document.createElement("a");
    a.href = URL.createObjectURL(zipBlob);
    a.download = "Andreani_PDFs.zip";
    a.click();

    log("🎉 TERMINADO");
};

</script>

</body>
</html>
