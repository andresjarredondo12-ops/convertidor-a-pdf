<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HTML → PDF CARPETA DIRECTA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #1e1e1e;
    color: white;
    padding: 20px;
}
button {
    padding: 10px 20px;
    margin: 10px;
    background: #00b894;
    border: none;
    color: white;
    cursor: pointer;
}
#log {
    background: #2d2d2d;
    padding: 10px;
    height: 300px;
    overflow-y: auto;
    text-align: left;
}
iframe {
    display:none;
}
</style>
</head>

<body>

<h2>📄 HTML → PDF Guardado en Carpeta</h2>

<button onclick="selectFolder()">1. Elegir carpeta destino</button>
<button onclick="document.getElementById('input').click()">2. Seleccionar HTML</button>

<input type="file" id="input" webkitdirectory multiple hidden>

<div id="log"></div>

<iframe id="frame"></iframe>

<script>

let dirHandle = null;

function log(msg){
    document.getElementById("log").innerHTML += msg + "<br>";
}

// 🔥 EXTRAER DATOS
function extraerSeguimiento(texto){
    let m = texto.match(/\b\d{15}\b/);
    return m ? m[0] : "SIN_SEGUIMIENTO";
}

function extraerID(texto){
    let m = texto.match(/ID[:\s]*([A-Z0-9\-]+)/i);
    return m ? m[1] : "SIN_ID";
}

// 🔥 CARPETA DESTINO
async function selectFolder(){
    dirHandle = await window.showDirectoryPicker();
    log("📁 Carpeta seleccionada");
}

// 🔥 PROCESO
document.getElementById('input').onchange = async (e)=>{

    const files = Array.from(e.target.files).filter(f=>f.name.endsWith(".html"));

    const frame = document.getElementById("frame");

    for(let file of files){

        try{

            log("Procesando: " + file.name);

            let html = await file.text();

            frame.srcdoc = html;

            await new Promise(r=>frame.onload = r);

            let doc = frame.contentDocument;

            let text = doc.body.innerText;

            let seguimiento = extraerSeguimiento(text);
            let id = extraerID(text);

            let nombre = `${seguimiento}_${id}.pdf`;

            let pdfBlob = await html2pdf()
                .set({
                    margin:0,
                    html2canvas:{ scale:2, useCORS:true },
                    jsPDF:{ unit:'mm', format:'a4' }
                })
                .from(doc.body)
                .outputPdf('blob');

            // 🔥 GUARDADO DIRECTO EN CARPETA
            const fileHandle = await dirHandle.getFileHandle(nombre, { create:true });
            const writable = await fileHandle.createWritable();
            await writable.write(pdfBlob);
            await writable.close();

            log("✔ Guardado: " + nombre);

        }catch(err){
            log("❌ ERROR: " + file.name + " -> " + err.message);
        }
    }

    log("🎉 FINALIZADO");
};

</script>

</body>
</html>
